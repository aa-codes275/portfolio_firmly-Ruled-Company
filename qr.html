<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f3a3d">
<title>QR | شركة الحكم الراسخ</title>
<link rel="icon" href="logo.jpg">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  body{min-height:100vh;min-height:100svh;display:grid;place-items:center;padding:1.5rem;background:
    radial-gradient(ellipse at top,rgba(201,168,106,.18),transparent 60%),var(--grad-teal)}
  .qr-wrap{max-width:480px;width:100%;background:rgba(15,36,38,.7);backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:24px;padding:2.5rem 1.8rem;text-align:center;box-shadow:var(--shadow);animation:fadeUp .7s}
  .qr-wrap img.logo{width:80px;height:80px;border-radius:16px;border:2px solid var(--gold);margin:0 auto 1rem}
  .qr-wrap h1{font-family:'Amiri',serif;font-size:1.5rem;background:var(--grad-gold);margin-bottom:.3rem}
  .qr-wrap .sub{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
  .qr-box{background:#fff;padding:1.2rem;border-radius:18px;display:inline-block;position:relative}
  .qr-box::before{content:"";position:absolute;inset:-2px;background:var(--grad-gold);border-radius:20px;z-index:-1}
  .qr-actions{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:1.5rem}
  .qr-actions .btn{flex:1;min-width:130px;justify-content:center;font-size:.85rem;padding:.7rem 1rem}
  .back-home{display:inline-flex;align-items:center;gap:.4rem;color:var(--gold);margin-top:1.5rem;font-size:.9rem}
  .socials{display:flex;gap:.6rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
  .socials a{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--teal-2);color:var(--gold);border:1px solid var(--line);font-size:1rem}
  .socials a:hover{background:var(--gold);color:var(--teal-2)}
</style>
</head>
<body>
<div class="qr-wrap">
  <img src="logo.jpg" alt="" class="logo">
  <h1>شركة الحكم الراسخ</h1>
  <p class="sub">Firmly Ruled Company • For Legal Services</p>
  <div class="qr-box"><div id="qr"></div></div>
  <div class="qr-actions">
    <a href="tel:+966500000000" class="btn btn-gold"><i class="fa-solid fa-phone"></i> اتصال</a>
    <a href="https://wa.me/966500000000" class="btn btn-ghost"><i class="fa-brands fa-whatsapp"></i> واتساب</a>
    <a href="mailto:info@firmly-ruled.com" class="btn btn-ghost"><i class="fa-solid fa-envelope"></i> بريد</a>
  </div>
  <div class="socials">
    <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
    <a href="#"><i class="fa-brands fa-instagram"></i></a>
    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
    <a href="#"><i class="fa-brands fa-snapchat"></i></a>
  </div>
  <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-right"></i> العودة للموقع</a>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById('qr'),{
    text:(window.location.origin+window.location.pathname).replace(/qr\.html$/,'index.html'),
    width:220,height:220,colorDark:'#1f3a3d',colorLight:'#ffffff',
    correctLevel:QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
